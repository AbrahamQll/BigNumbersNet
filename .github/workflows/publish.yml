name: Publish NuGet Package

on:
  release:
    types: [published]

# This permissions block is strictly required for OpenID Connect (OIDC) to function
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Deterministic history mapping for SourceLink

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract Version from Tag
        id: get_version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Default fallback if the tag is somehow missing
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="1.0.0"
          fi
          CLEAN_VERSION="${TAG_NAME#v}" # Strips leading 'v' if present (e.g., v1.0.0 -> 1.0.0)
          echo "PACKAGE_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      # Explicitly pass EnableWindowsTargeting during restore
      - name: Restore dependencies
        run: dotnet restore BigNumbersNet/BigNumbersNet.csproj /p:EnableWindowsTargeting=true

      # Explicitly pass EnableWindowsTargeting during build
      - name: Build Project
        run: dotnet build BigNumbersNet/BigNumbersNet.csproj --configuration Release --no-restore /p:EnableWindowsTargeting=true

      # Create the package (EnableWindowsTargeting is inherited here)
      - name: Create NuGet Package
        run: dotnet pack BigNumbersNet/BigNumbersNet.csproj --configuration Release --no-build --output ./dist /p:Version=${{ env.PACKAGE_VERSION }}

      # Exchanges the GitHub OIDC token for a temporary, 1-hour NuGet.org key
      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: AbrahamQll

      # Pushes both the package (.nupkg) and symbols (.snupkg) to NuGet.org
      - name: Push to NuGet.org
        run: dotnet nuget push ./dist/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate